services:
  app:
    build: . 
    ports:
      - "8080:8081"
    environment:
     
      - DB_URL=postgres://user_logistics:pass_logistics@db:5432/logistics_db?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=una_clave_secreta_muy_larga_y_segura_123
      - ADMIN_BOOTSTRAP_SECRET=mi_secreto_super_seguro
    depends_on:
      - db
      - redis

  db:
    image: postgis/postgis:latest
    ports:
      - "5433:5432" 
    environment:
      POSTGRES_USER: user_logistics
      POSTGRES_PASSWORD: pass_logistics
      POSTGRES_DB: logistics_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  