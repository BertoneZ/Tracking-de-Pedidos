basePath: /api
definitions:
  domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      role:
        type: string
    type: object
  dto.BootstrapAdminRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      secret:
        type: string
    required:
    - email
    - full_name
    - password
    - secret
    type: object
  dto.CreateOrderRequest:
    properties:
      destination_address:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.OrderItemRequest'
        type: array
    required:
    - destination_address
    - items
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.OrderItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.OrderItemResponse:
    properties:
      product_name:
        type: string
      quantity:
        type: integer
    type: object
  dto.OrderResponse:
    properties:
      created_at:
        type: string
      customer_id:
        type: string
      customer_name:
        type: string
      destination_address:
        type: string
      driver_id:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.OrderItemResponse'
        type: array
      status:
        type: string
      total_price:
        type: number
    type: object
  dto.ProductResponse:
    properties:
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - driver
        - customer
        type: string
    required:
    - email
    - full_name
    - password
    - role
    type: object
  dto.UpdateLocationRequest:
    properties:
      lat:
        type: number
      lng:
        type: number
    required:
    - lat
    - lng
    type: object
  dto.UpdateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: number
    type: object
  dto.UpsertProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: number
    required:
    - name
    - price
    type: object
host: localhost:8081
info:
  contact: {}
  description: Servidor de tracking de pedidos en tiempo real.
  title: API de Logística Rafaela
  version: "1.0"
paths:
  /admin/users:
    get:
      description: Devuelve todos los usuarios del sistema. Solo ADMIN. Soporta filtros
        por role y active.
      parameters:
      - description: Filtrar por role (driver, customer, admin)
        in: query
        name: role
        type: string
      - description: Filtrar por estado activo (true/false)
        in: query
        name: active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.User'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar usuarios
      tags:
      - Admin
  /admin/users/{id}/deactivate:
    patch:
      description: Realiza soft delete de un usuario (is_active=false). Solo ADMIN.
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Desactivar usuario
      tags:
      - Admin
  /auth/bootstrap-admin:
    post:
      consumes:
      - application/json
      description: Crea el primer admin del sistema. Requiere el secret de bootstrap
        y falla si ya existe un admin.
      parameters:
      - description: Datos para crear el admin inicial
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/dto.BootstrapAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Crear primer admin (bootstrap)
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Devuelve un token JWT si las credenciales son válidas
      parameters:
      - description: Credenciales de usuario
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Iniciar sesión
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Crea un usuario en la DB con email, password, nombre y rol
      parameters:
      - description: Datos del registro
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Registrar un nuevo usuario
      tags:
      - auth
  /orders:
    post:
      consumes:
      - application/json
      description: Toma la dirección del cliente, busca las coordenadas y guarda el
        pedido
      parameters:
      - description: Datos del pedido
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear un nuevo pedido
      tags:
      - Orders
  /orders/{id}/accept:
    patch:
      description: Cambia el estado del pedido a ASSIGNED
      parameters:
      - description: ID del pedido
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Aceptar un pedido (Driver)
      tags:
      - Orders
  /orders/{id}/complete:
    patch:
      description: Cambia el estado a 'DELIVERED' en Postgres y elimina la ubicación
        de Redis
      parameters:
      - description: ID del pedido
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Finalizar entrega (Driver)
      tags:
      - Orders
  /orders/{id}/location:
    get:
      description: Obtiene la última posición registrada en Redis del driver asignado
        a la orden
      parameters:
      - description: ID del pedido
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              format: float64
              type: number
            type: object
      security:
      - BearerAuth: []
      summary: Consultar ubicación de un pedido (Cliente)
      tags:
      - Orders
  /orders/history:
    get:
      description: Trae todos los pedidos DELIVERED del usuario
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.OrderResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Ver historial de pedidos
      tags:
      - Orders
  /orders/location:
    post:
      consumes:
      - application/json
      description: Guarda la ubicación actual en Redis
      parameters:
      - description: Coordenadas
        in: body
        name: location
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateLocationRequest'
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Actualizar GPS (Driver)
      tags:
      - Orders
  /orders/pending:
    get:
      description: Obtiene todos los pedidos con estado 'PENDING' disponibles para
        ser aceptados
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.OrderResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar pedidos pendientes
      tags:
      - Orders
  /products:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProductResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Obtener el menú de productos
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Crea un nuevo producto del catalogo. Solo ADMIN.
      parameters:
      - description: Datos del producto
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/dto.UpsertProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear producto
      tags:
      - Products
  /products/{id}:
    delete:
      description: Elimina un producto por ID. Solo ADMIN.
      parameters:
      - description: ID del producto
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar producto
      tags:
      - Products
    put:
      consumes:
      - application/json
      description: Actualiza un producto existente por ID. Solo ADMIN.
      parameters:
      - description: ID del producto
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar del producto
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Actualizar producto
      tags:
      - Products
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
